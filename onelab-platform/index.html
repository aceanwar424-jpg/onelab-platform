<!DOCTYPE html>
<html lang="id">

<body>
<!-- ═══ SIDEBAR — Category Rail + Flyout Panel (Virtu Digilab style) ═══ -->
<aside class="sidebar-rail" id="sidebar-rail">
  <div class="rail-logo" onclick="navigate('dashboard');closeFlyout()">
    <div class="logo-mark">OL</div>
  </div>

  <nav class="rail-nav" id="rail-nav">
    <button class="rail-item active" data-cat="utama" onclick="openFlyout('utama')" data-tooltip="Utama">
      <span class="rail-icon">🏠</span>
    </button>
    <button class="rail-item" data-cat="marketing" onclick="openFlyout('marketing')" data-tooltip="Marketing & Sales">
      <span class="rail-icon">🤝</span>
      <span class="rail-badge" id="badge-partners-rail" style="display:none">0</span>
    </button>
    <button class="rail-item" data-cat="lab" onclick="openFlyout('lab')" data-tooltip="Operasional Lab">
      <span class="rail-icon">🧪</span>
    </button>
    <button class="rail-item" data-cat="klinik" onclick="openFlyout('klinik')" data-tooltip="Layanan Klinik">
      <span class="rail-icon">🏨</span>
    </button>
    <button class="rail-item" data-cat="homecare" onclick="openFlyout('homecare')" data-tooltip="Home Care">
      <span class="rail-icon">🏡</span>
    </button>
    <button class="rail-item" data-cat="finance" onclick="openFlyout('finance')" data-tooltip="Finance & Billing">
      <span class="rail-icon">💰</span>
    </button>
    <button class="rail-item" data-cat="inventory" onclick="openFlyout('inventory')" data-tooltip="Inventory & Logistik">
      <span class="rail-icon">📦</span>
    </button>
    <button class="rail-item" data-cat="hrd" onclick="openFlyout('hrd')" data-tooltip="HRD & SDM">
      <span class="rail-icon">👥</span>
    </button>
    <button class="rail-item" data-cat="produktivitas" onclick="openFlyout('produktivitas')" data-tooltip="Produktivitas">
      <span class="rail-icon">📋</span>
    </button>
    <button class="rail-item" data-cat="konfigurasi" onclick="openFlyout('konfigurasi')" data-tooltip="Konfigurasi">
      <span class="rail-icon">⚙️</span>
    </button>
  </nav>

  <div class="rail-footer">
    <span class="conn-dot" id="conn-dot" title="Status koneksi"></span>
  </div>

  <!-- User info — hidden compat refs, moved to topbar dropdown -->
  <div id="sidebar-user" style="display:none">
    <div id="user-avatar"></div>
    <div><span id="user-name-sidebar"></span><span id="user-role-sidebar"></span></div>
  </div>
  <div id="conn-label" style="display:none"></div>
</aside>

<!-- ═══ FLYOUT PANEL — Submenu per Category ═══ -->
<div class="flyout-overlay" id="flyout-overlay" onclick="closeFlyout()"></div>
<div class="flyout-panel" id="flyout-panel">
  <div class="flyout-header">
    <div class="flyout-title" id="flyout-title">Menu</div>
    <button class="flyout-close" onclick="closeFlyout()">✕</button>
  </div>
  <div class="flyout-body" id="flyout-body"></div>
</div>


<!-- ═══ TOPBAR ═══ -->
<div class="topbar" id="topbar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="topbar-breadcrumb">
    <span style="color:var(--text3);font-weight:500;font-size:12px">OneLab</span>
    <span>/</span>
    <span class="topbar-title" id="topbar-title" style="font-size:13.5px;font-weight:700;color:var(--text)">Dashboard</span>
  </div>
  <div class="topbar-right">
    <div id="topbar-date" style="font-size:12px;color:var(--text3);font-weight:500;padding-right:4px"></div>
    <button class="topbar-btn" title="Notifikasi" onclick="">
      🔔
      <span class="topbar-notif-dot"></span>
    </button>
    <!-- User dropdown -->
    <div style="position:relative" id="topbar-user-wrap">
      <div id="topbar-user" onclick="toggleUserDropdown()"
        style="display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:var(--r);
          background:var(--bg2);border:1px solid var(--border);cursor:pointer;
          font-size:12.5px;font-weight:600;color:var(--text);user-select:none;transition:all .15s"
        onmouseover="this.style.borderColor='var(--teal)';this.style.background='var(--teal-light)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--bg2)'">
        <div id="topbar-avatar" style="width:28px;height:28px;background:linear-gradient(135deg,var(--teal),var(--accent));
          border-radius:50%;display:flex;align-items:center;justify-content:center;
          font-size:11px;font-weight:800;color:#fff;flex-shrink:0">U</div>
        <div style="min-width:0">
          <div id="topbar-user-name" style="font-size:13px;font-weight:700;color:var(--text);
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px">—</div>
          <div id="topbar-user-role" style="font-size:10px;color:var(--text3);margin-top:-1px">—</div>
        </div>
        <span style="font-size:10px;color:var(--text3);margin-left:2px">▾</span>
      </div>

      <!-- Dropdown menu -->
      <div id="user-dropdown" style="display:none;position:absolute;top:calc(100% + 6px);right:0;
        background:#fff;border:1px solid var(--border);border-radius:var(--r-md);
        box-shadow:var(--shadow-md);min-width:240px;z-index:999;overflow:hidden;
        animation:modalIn .15s ease">

        <!-- Header -->
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg2)">
          <div style="display:flex;align-items:center;gap:10px">
            <div id="dropdown-avatar" style="width:38px;height:38px;border-radius:50%;
              background:linear-gradient(135deg,var(--teal),var(--accent));
              display:flex;align-items:center;justify-content:center;
              font-size:15px;font-weight:800;color:#fff;flex-shrink:0">U</div>
            <div style="min-width:0">
              <div id="dropdown-name" style="font-weight:800;font-size:13.5px;color:var(--text)">—</div>
              <div id="dropdown-email" style="font-size:11.5px;color:var(--text3);
                white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">—</div>
              <div id="dropdown-role-badge" style="margin-top:3px"></div>
            </div>
          </div>
        </div>

        <!-- Menu items -->
        <div style="padding:6px 0">
          <button onclick="closeUserDropdown();navigate('settings')"
            class="dropdown-item">
            ⚙️ Pengaturan Sistem
          </button>
          <button onclick="closeUserDropdown();openResetPassword()"
            class="dropdown-item">
            🔑 Ganti Password
          </button>
          <button onclick="closeUserDropdown();openEditProfile()"
            class="dropdown-item">
            👤 Edit Profil
          </button>
          <div style="border-top:1px solid var(--border);margin:4px 0"></div>
          <button onclick="doLogout()"
            class="dropdown-item" style="color:#EF4444">
            ⏻ Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Sidebar rail — always 64px, flyout handles submenu ──
function toggleSidebar() {
  // Mobile: toggle rail visibility (kept for compat with hamburger button)
  document.getElementById('sidebar-rail')?.classList.toggle('open');
}

// ── Date display ─────────────────────────
function updateDate() {
  const el = document.getElementById('topbar-date');
  if (!el) return;
  el.textContent = new Date().toLocaleDateString('id-ID',{
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
}

// ── Boot ─────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  updateDate();
  setInterval(updateDate, 60000);

  const token = localStorage.getItem('ol_token');
  if (token) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { ...SB_HEADERS, 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const user = await res.json();
        if (user && user.id) {
          window.currentUser = user;
          try {
            const profile = await sbGet('user_profiles',`select=*&id=eq.${user.id}`);
            if (profile?.[0]) window.currentUser.profile = profile[0];
          } catch(e) {}
          setupAppUI();
          applyRoleMenu();
          if (typeof injectExecToggle==='function') setTimeout(injectExecToggle,500);
          checkConnection();
          navigate('dashboard');
          // Check renewals after load
          setTimeout(()=>{ if(typeof checkMOURenewals==='function') checkMOURenewals(); }, 2000);
          return;
        }
      }
    } catch(e) {}
  }
  showLoginScreen();
});


function setupAppUI() {
  const name      = getUserName();
  const role      = getUserRole();
  const email     = window.currentUser?.email || '';
  const roleLabel = typeof getRoleLabel === 'function' ? getRoleLabel(role) : role;
  const initials  = name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() || name.charAt(0).toUpperCase();
  const ROLE_COLORS = {
    super_admin:'#7B1FA2', direktur:'#0A2342', manager:'#00897B', spv:'#0E7490',
    sales:'#1565C0', operasional:'#2E7D32', hrd_staff:'#E65100',
    finance_staff:'#00838F', viewer:'#546E7A',
  };
  const roleColor = ROLE_COLORS[role] || 'var(--teal)';

  // Topbar user pill
  const topbarAvEl   = document.getElementById('topbar-avatar');
  const topbarNameEl = document.getElementById('topbar-user-name');
  const topbarRoleEl = document.getElementById('topbar-user-role');
  if (topbarAvEl)   { topbarAvEl.textContent = initials; topbarAvEl.style.background = `linear-gradient(135deg,${roleColor},${roleColor}99)`; }
  if (topbarNameEl) topbarNameEl.textContent = name;
  if (topbarRoleEl) topbarRoleEl.textContent = roleLabel;

  // Dropdown header
  const ddAvEl    = document.getElementById('dropdown-avatar');
  const ddNameEl  = document.getElementById('dropdown-name');
  const ddEmailEl = document.getElementById('dropdown-email');
  const ddRoleEl  = document.getElementById('dropdown-role-badge');
  if (ddAvEl)    { ddAvEl.textContent = initials; ddAvEl.style.background = `linear-gradient(135deg,${roleColor},${roleColor}99)`; }
  if (ddNameEl)  ddNameEl.textContent  = name;
  if (ddEmailEl) ddEmailEl.textContent = email;
  if (ddRoleEl)  ddRoleEl.innerHTML    = `<span style="background:${roleColor}20;color:${roleColor};font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">${roleLabel}</span>`;

  // Hidden sidebar refs (kept for JS compat)
  // refs already updated above

  const badge = document.getElementById('badge-partners');
  if (badge) badge.style.display = '';
}

async function checkConnection() {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  try {
    await sbGet('partners','select=count&limit=1');
    if (dot) dot.className = 'conn-dot ok';
    if (lbl) lbl.textContent = 'Terhubung';
  } catch(e) {
    if (dot) dot.className = 'conn-dot error';
    if (lbl) lbl.textContent = 'Offline';
  }
}

setInterval(checkConnection, 60000);

// ── User Dropdown ─────────────────────────────────────
function toggleUserDropdown() {
  const dd = document.getElementById('user-dropdown');
  if (!dd) return;
  const isOpen = dd.style.display !== 'none';
  dd.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    // Close when clicking outside
    setTimeout(() => {
      document.addEventListener('click', closeDropdownOutside, {once:true});
    }, 10);
  }
}

function closeDropdownOutside(e) {
  const wrap = document.getElementById('topbar-user-wrap');
  if (wrap && !wrap.contains(e.target)) closeUserDropdown();
}

function closeUserDropdown() {
  const dd = document.getElementById('user-dropdown');
  if (dd) dd.style.display = 'none';
}

function openResetPassword() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">🔑 Ganti Password</div>
      <button class="modal-close" onclick="closeModalForce()">✕</button>
    </div>
    <div class="form-group">
      <label>Password Baru *</label>
      <input type="password" id="rp-new" placeholder="Minimal 8 karakter">
    </div>
    <div class="form-group">
      <label>Konfirmasi Password *</label>
      <input type="password" id="rp-confirm" placeholder="Ulangi password baru">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalForce()">Batal</button>
      <button class="btn btn-teal" onclick="doResetPassword()">🔑 Simpan Password</button>
    </div>`, 'narrow');
}

async function doResetPassword() {
  const np = document.getElementById('rp-new')?.value;
  const cp = document.getElementById('rp-confirm')?.value;
  if (!np || np.length < 8) { toast('Password minimal 8 karakter','err'); return; }
  if (np !== cp)            { toast('Password tidak cocok','err'); return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method:'PUT',
      headers:{...SB_HEADERS,'Authorization':`Bearer ${getStoredToken()}`},
      body: JSON.stringify({password: np}),
    });
    if (!res.ok) throw new Error((await res.json()).message||'Gagal');
    toast('✅ Password berhasil diubah','ok');
    closeModalForce();
  } catch(e) { toast('❌ '+e.message,'err'); }
}

function openEditProfile() {
  const p      = window.currentUser?.profile || {};
  const name   = getUserName ? getUserName() : '';
  const email  = window.currentUser?.email || '';
  const role   = getUserRole ? getUserRole() : 'sales';
  const rc     = (typeof ROLES !== 'undefined' ? ROLES[role] : null) || {};

  const DEPT_OPTIONS = ['Management','Medis','Lab & Analis','Finance','CS & Ops','Support','Marketing & Sales'];

  openModal(`
    <div class="modal-header">
      <div class="modal-title">👤 Edit Profil</div>
      <button class="modal-close" onclick="closeModalForce()">✕</button>
    </div>

    <div class="status-box" style="background:var(--bg2);font-size:12px;margin-bottom:14px">
      📧 ${email} &nbsp;·&nbsp;
      <span style="color:${rc.color||'var(--teal)'};font-weight:700">● ${rc.label||role}</span>
      &nbsp;(role diatur oleh Super Admin di User Management)
    </div>

    <div class="form-group">
      <label>Nama Lengkap *</label>
      <input type="text" id="ep-name" value="${name}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Jabatan</label>
        <input type="text" id="ep-jabatan" value="${p.jabatan||''}" placeholder="Contoh: Head of Operations">
      </div>
      <div class="form-group">
        <label>Divisi / Departemen</label>
        <select id="ep-division">
          <option value="">-- Pilih --</option>
          ${DEPT_OPTIONS.map(d=>`<option value="${d}" ${p.division===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>No. HP / WA</label>
        <input type="text" id="ep-phone" value="${p.phone||''}" placeholder="08xxxxxxxxxx">
      </div>
      <div class="form-group">
        <label>NIP / Employee ID</label>
        <input type="text" id="ep-nip" value="${p.nip||''}" placeholder="Opsional">
      </div>
    </div>
    <div class="form-group">
      <label>Bio Singkat</label>
      <textarea id="ep-bio" rows="2" placeholder="Deskripsi singkat peran...">${p.bio||''}</textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalForce()">Batal</button>
      <button class="btn btn-teal" onclick="doSaveProfile()">💾 Simpan Profil</button>
    </div>`, 'narrow');
}

async function doSaveProfile() {
  const name     = document.getElementById('ep-name')?.value.trim();
  const phone    = document.getElementById('ep-phone')?.value.trim();
  const jabatan  = document.getElementById('ep-jabatan')?.value.trim();
  const division = document.getElementById('ep-division')?.value;
  const nip      = document.getElementById('ep-nip')?.value.trim();
  const bio      = document.getElementById('ep-bio')?.value.trim();
  if (!name) { toast('Nama tidak boleh kosong','err'); return; }
  const userId = window.currentUser?.id;
  if (!userId) { toast('Session tidak valid','err'); return; }
  try {
    const payload = {
      full_name:  name,
      phone:      phone||null,
      jabatan:    jabatan||null,
      division:   division||null,
      nip:        nip||null,
      bio:        bio||null,
      updated_at: new Date().toISOString(),
    };
    await sbPatch('user_profiles', userId, payload);
    if (window.currentUser?.profile) {
      Object.assign(window.currentUser.profile, payload);
    }
    toast('✅ Profil diupdate','ok');
    closeModalForce();
    setupAppUI();
  } catch(e) {
    if (e.message && e.message.includes('column')) {
      toast('⚠️ Jalankan migration SQL dulu untuk field jabatan/divisi','warn',5000);
    } else {
      toast('❌ '+e.message,'err');
    }
  }
}

      {page:'attendance', icon:'⏰', label:'Absensi', action:"navigate('attendance')"},
      {page:'hrd-cuti', icon:'🕐', label:'Cuti & Izin', action:"navigate('hrd')"},
      {page:'hrd-payroll', icon:'💵', label:'Penggajian', action:"navigate('hrd')"},
    ]
  },
  produktivitas: {
    label: 'Produktivitas',
    items: [
      {page:'tasks', icon:'📋', label:'Task Management', action:"navigate('tasks')"},
      {page:'regulatory', icon:'📊', label:'Pelaporan & Audit', action:"navigate('regulatory')"},
    ]
  },
  konfigurasi: {
    label: 'Konfigurasi',
    items: [
      {page:'users', icon:'👤', label:'User Management', action:"navigate('users')", adminOnly:true},
      {page:'product', icon:'🧬', label:'Product', action:"navigate('product')"},
      {page:'corporate', icon:'🏢', label:'Corporate', action:"navigate('corporate')"},
      {page:'import', icon:'📥', label:'Import Excel', action:"navigate('import')"},
      {page:'settings', icon:'⚙️', label:'Pengaturan', action:"navigate('settings')"},
    ]
  },
};

let activeFlyoutCat = null;

function openFlyout(cat) {
  const menu = FLYOUT_MENUS[cat];
  if (!menu) return;
  activeFlyoutCat = cat;

  // Update rail active state
  document.querySelectorAll('.rail-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`.rail-item[data-cat="${cat}"]`)?.classList.add('active');

  // Get current allowed pages (role-based)
  const role = typeof getUserRole === 'function' ? getUserRole() : 'sales';
  const allowedPages = window.roleConfig?.pages || null;
  const isSuperAdmin = role === 'super_admin';

  document.getElementById('flyout-title').textContent = menu.label;
  document.getElementById('flyout-body').innerHTML = menu.items.map(item => {
    if (item.adminOnly && !['super_admin','manager','direktur'].includes(role)) return '';
    if (!isSuperAdmin && allowedPages && !allowedPages.includes(item.page) && !item.soon) return '';
    const currentPage = window.currentPage || '';
    const isActive = currentPage === item.page;
    if (item.soon) {
      return `<div class="flyout-item flyout-item-soon">
        <span class="flyout-item-icon">${item.icon}</span>
        <span class="flyout-item-label">${item.label}</span>
        <span class="flyout-soon-badge">soon</span>
      </div>`;
    }
    return `<button class="flyout-item ${isActive?'active':''}" data-page="${item.page}"
      onclick="${item.action};setActiveFlyoutItem('${item.page}')">
      <span class="flyout-item-icon">${item.icon}</span>
      <span class="flyout-item-label">${item.label}</span>
      ${item.badge?`<span class="flyout-item-badge" id="${item.badge}-flyout" style="display:none">0</span>`:''}
    </button>`;
  }).join('');

  document.getElementById('flyout-panel').classList.add('open');
  document.getElementById('flyout-overlay').classList.add('open');
}

function closeFlyout() {
  document.getElementById('flyout-panel')?.classList.remove('open');
  document.getElementById('flyout-overlay')?.classList.remove('open');
}

function setActiveFlyoutItem(page) {
  window.currentPage = page;
  document.querySelectorAll('.flyout-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`.flyout-item[data-page="${page}"]`)?.classList.add('active');
  // Close flyout on mobile after click (keep open on desktop for convenience)
  if (window.innerWidth < 900) closeFlyout();
}

// Auto-open category based on current page (called from navigate())
function syncFlyoutToPage(page) {
  for (const [cat, menu] of Object.entries(FLYOUT_MENUS)) {
    if (menu.items.some(i => i.page === page)) {
      document.querySelectorAll('.rail-item').forEach(b => b.classList.remove('active'));
      document.querySelector(`.rail-item[data-cat="${cat}"]`)?.classList.add('active');
      activeFlyoutCat = cat;
      window.currentPage = page;
      break;
    }
  }
}

</script>
