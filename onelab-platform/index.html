<script>
window.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('ol_token');
  if (token) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { ...SB_HEADERS, 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const user = await res.json();
        if (user && user.id) {
          window.currentUser = user;
          try {
            const profile = await sbGet('user_profiles',`select=*&id=eq.${user.id}`);
            if (profile && profile[0]) window.currentUser.profile = profile[0];
          } catch(e) {}
          setupAppUI();
          applyRoleMenu();
          checkConnection();
          navigate('dashboard');
          return;
        }
      }
    } catch(e) {}
  }
  showLoginScreen();
});

function setupAppUI() {
  const name = getUserName();
  const role = getUserRole();
  document.getElementById('sidebar-user').style.display = 'flex';
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('user-name-sidebar').textContent = name;
  document.getElementById('user-role-sidebar').textContent = role;
  document.getElementById('topbar-user').textContent = name;
}

async function checkConnection() {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  try {
    await sbGet('partners','select=count&limit=1');
    dot.className = 'conn-dot ok';
    lbl.textContent = 'Terhubung';
  } catch(e) {
    dot.className = 'conn-dot error';
    lbl.textContent = 'Offline';
  }
}

setInterval(checkConnection, 60000);
</script>
