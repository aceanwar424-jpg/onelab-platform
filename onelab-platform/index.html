<script>
// ── Sidebar mini/expand ──────────────────
let isMini = localStorage.getItem('ol_mini') !== '0'; // default = mini

function applyMiniState() {
  const sidebar = document.getElementById('sidebar');
  const topbar  = document.getElementById('topbar');
  const main    = document.getElementById('main-content');
  const btn     = document.getElementById('toggle-btn');
  if (isMini) {
    sidebar.classList.remove('expanded');
    topbar.classList.remove('expanded');
    main.classList.remove('expanded');
    sidebar.classList.add('mini');
    topbar.classList.add('mini');
    main.classList.add('mini');
    if (btn) btn.textContent = '›';
  } else {
    sidebar.classList.remove('mini');
    topbar.classList.remove('mini');
    main.classList.remove('mini');
    sidebar.classList.add('expanded');
    topbar.classList.add('expanded');
    main.classList.add('expanded');
    if (btn) btn.textContent = '‹';
  }
}

function toggleMini() {
  isMini = !isMini;
  localStorage.setItem('ol_mini', isMini ? '1' : '0');
  applyMiniState();
}

function toggleSidebar() {
  document.getElementById('sidebar')?.classList.toggle('open');
}

// ── Date display ─────────────────────────
function updateDate() {
  const el = document.getElementById('topbar-date');
  if (!el) return;
  el.textContent = new Date().toLocaleDateString('id-ID',{
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
}

// ── Boot ─────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  applyMiniState();
  updateDate();
  setInterval(updateDate, 60000);

  const token = localStorage.getItem('ol_token');
  if (token) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { ...SB_HEADERS, 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const user = await res.json();
        if (user && user.id) {
          window.currentUser = user;
          try {
            const profile = await sbGet('user_profiles',`select=*&id=eq.${user.id}`);
            if (profile?.[0]) window.currentUser.profile = profile[0];
          } catch(e) {}
          setupAppUI();
          applyRoleMenu();
          checkConnection();
          navigate('dashboard');
          // Check renewals after load
          setTimeout(()=>{ if(typeof checkMOURenewals==='function') checkMOURenewals(); }, 2000);
          return;
        }
      }
    } catch(e) {}
  }
  showLoginScreen();
});


function setupAppUI() {
  const name      = getUserName();
  const role      = getUserRole();
  const roleLabel = typeof getRoleLabel === 'function' ? getRoleLabel(role) : role;
  const initials2 = name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() || name.charAt(0).toUpperCase();

  document.getElementById('sidebar-user').style.display  = 'flex';
  document.getElementById('user-avatar').textContent     = initials2;
  document.getElementById('user-name-sidebar').textContent = name;
  document.getElementById('user-role-sidebar').textContent = roleLabel;
  const initials = name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const avatarEl = document.getElementById('topbar-avatar');
  const nameEl   = document.getElementById('topbar-user-name');
  if (avatarEl) avatarEl.textContent = initials || name.charAt(0).toUpperCase();
  if (nameEl)   nameEl.textContent   = name;

  const badge = document.getElementById('badge-partners');
  if (badge) badge.style.display = '';
}

async function checkConnection() {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  try {
    await sbGet('partners','select=count&limit=1');
    if (dot) dot.className = 'conn-dot ok';
    if (lbl) lbl.textContent = 'Terhubung';
  } catch(e) {
    if (dot) dot.className = 'conn-dot error';
    if (lbl) lbl.textContent = 'Offline';
  }
}

// ── Sidebar hover expand (when locked mini) ─────────
document.addEventListener('DOMContentLoaded', () => {
  const sb   = document.getElementById('sidebar');
  const tb   = document.getElementById('topbar');
  const main = document.getElementById('main-content');
  if (!sb) return;

  sb.addEventListener('mouseenter', () => {
    if (!sb.classList.contains('expanded')) {
      sb.classList.add('hover-expanded');
      // Don't shift topbar/main on hover - just overlay sidebar
    }
  });

  sb.addEventListener('mouseleave', () => {
    sb.classList.remove('hover-expanded');
  });
});


setInterval(checkConnection, 60000);
</script>
