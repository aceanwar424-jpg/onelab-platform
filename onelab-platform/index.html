<script>
// ── Sidebar mini/expand ──────────────────
let isMini = localStorage.getItem('ol_mini') === '1';

function applyMiniState() {
  const sidebar = document.getElementById('sidebar');
  const topbar  = document.getElementById('topbar');
  const main    = document.getElementById('main-content');
  const btn     = document.getElementById('toggle-btn');
  if (isMini) {
    sidebar.classList.add('mini');
    topbar.classList.add('mini');
    main.classList.add('mini');
    if (btn) btn.textContent = '›';
  } else {
    sidebar.classList.remove('mini');
    topbar.classList.remove('mini');
    main.classList.remove('mini');
    if (btn) btn.textContent = '‹';
  }
}

function toggleMini() {
  isMini = !isMini;
  localStorage.setItem('ol_mini', isMini ? '1' : '0');
  applyMiniState();
}

function toggleSidebar() {
  document.getElementById('sidebar')?.classList.toggle('open');
}

// ── Date display ─────────────────────────
function updateDate() {
  const el = document.getElementById('topbar-date');
  if (!el) return;
  el.textContent = new Date().toLocaleDateString('id-ID',{
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
}

// ── Boot ─────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  applyMiniState();
  updateDate();
  setInterval(updateDate, 60000);

  const token = localStorage.getItem('ol_token');
  if (token) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { ...SB_HEADERS, 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const user = await res.json();
        if (user && user.id) {
          window.currentUser = user;
          try {
            const profile = await sbGet('user_profiles',`select=*&id=eq.${user.id}`);
            if (profile?.[0]) window.currentUser.profile = profile[0];
          } catch(e) {}
          setupAppUI();
          applyRoleMenu();
          checkConnection();
          navigate('dashboard');
          // Check renewals after load
          setTimeout(()=>{ if(typeof checkMOURenewals==='function') checkMOURenewals(); }, 2000);
          return;
        }
      }
    } catch(e) {}
  }
  showLoginScreen();
});

function setupAppUI() {
  const name = getUserName();
  const role = getUserRole();
  const rc   = (typeof ROLES !== 'undefined' && ROLES[role]) ? ROLES[role] : {label: role};

  document.getElementById('sidebar-user').style.display  = 'flex';
  document.getElementById('user-avatar').textContent     = name.charAt(0).toUpperCase();
  document.getElementById('user-name-sidebar').textContent = name;
  document.getElementById('user-role-sidebar').textContent = rc.label || role;
  document.getElementById('topbar-user').textContent     = name;

  const badge = document.getElementById('badge-partners');
  if (badge) badge.style.display = '';
}

async function checkConnection() {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  try {
    await sbGet('partners','select=count&limit=1');
    if (dot) dot.className = 'conn-dot ok';
    if (lbl) lbl.textContent = 'Terhubung';
  } catch(e) {
    if (dot) dot.className = 'conn-dot error';
    if (lbl) lbl.textContent = 'Offline';
  }
}

setInterval(checkConnection, 60000);
</script>
